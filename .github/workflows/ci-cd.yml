name: Documentação da API de CI/CD

on:
  push:
    branches:
      - main

jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar Spectral
        run: npm install -g @stoplight/spectral-cli @stoplight/spectral-rulesets

      - name: Criar ruleset
        run: |
          echo 'extends: ["spectral:oas"]' > .spectral.yaml

      - name: Validar OpenAPI
        run: spectral lint openapi.yaml

  publicar-docs:
    needs: validar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar documentação HTML
        run: |
          npm install -g redoc-cli
          redoc-cli build openapi.yaml -o index.html

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
